name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Set Version Info
        run: |
          V_VERSION=$(git tag --sort=-committerdate | head -n1)
          V_VERSION=${V_VERSION:-0.0.0}
          echo "V_HASH=$(echo ${{ github.sha }} | cut -c -7)" >> $GITHUB_ENV
          echo "V_VER=$V_VERSION" >> $GITHUB_ENV

      - name: Set Snapshot Suffix
        run: |
          if [[ "${{ github.event.repository.default_branch }}" != "${{ github.ref_name }}" ]]; then
            echo "SUFFIX=-SNAPSHOT" >> "$GITHUB_ENV"
          else
            V_VERSION=$(git tag --sort=-committerdate | head -n1)
            if [[ "$V_VERSION" =~ \.0$ ]]; then
              echo "SUFFIX=-SNAPSHOT" >> "$GITHUB_ENV"
            fi
          fi

      - name: Build and push Docker image with Jib
        run: ./gradlew jib --no-daemon
        env:
          dockerRepository: ${{ secrets.DOCKER_REPOSITORY }}
          testSpringConfLocation: ${{ secrets.TEST_SPRING_CONF_LOCATION || 'src/test/resources/test-spring-conf.yaml.example' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            build/libs/*.jar
            build/reports/
          retention-days: 7
