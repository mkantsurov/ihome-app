name: I-Home Web Service Build
on:
  push:
    branches:
      - master
jobs:
  build_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.4.1'

      - name: Set Version Info
        run: |
          V_VERSION=$(git tag --sort=-committerdate | head -n1)
          V_VERSION=${V_VERSION:-0.0.0}
          echo "V_HASH=$(echo ${{ github.sha }} | cut -c -7)" >> $GITHUB_ENV
          echo "V_VER=$V_VERSION" >> $GITHUB_ENV
      - name: Set Snapshot Suffix
        run: |
          if [[ "${{ github.event.repository.default_branch }}" != "${{ github.ref_name }}" ]]; then
            echo "SUFFIX=-SNAPSHOT" >> "$GITHUB_ENV"
          else
            V_VERSION=$(git tag --sort=-committerdate | head -n1)
            if [[ "$V_VERSION" =~ \.0$ ]]; then
              echo "SUFFIX=-SNAPSHOT" >> "$GITHUB_ENV"
            fi
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        id: jib_build
        run: |
          gradle build jib
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
